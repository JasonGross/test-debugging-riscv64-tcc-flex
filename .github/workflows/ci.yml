name: reproduce
on:
  push:
  workflow_dispatch:

jobs:
  matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install deps (riscv64 cross gcc, qemu-user)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-riscv64-linux-gnu qemu-user-static curl git make

      - name: cache toolchain builds
        uses: actions/cache@v4
        with:
          path: build
          key: build-${{ hashFiles('setup.sh') }}

      - name: build matrix legs (upstream tcc, musl, flex x2)
        run: ./setup.sh

      - name: run reproduction matrix
        run: ./repro.sh

      - name: run matrix on minimized.l too (if present)
        run: |
          [ -f minimized.l ] && ./repro.sh minimized.l || echo "no minimized.l yet"
